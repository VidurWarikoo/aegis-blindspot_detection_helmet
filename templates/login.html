<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis Sign In</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070a;
    --panel: #101013;
    --panel-2: #16161a;
    --border: #232328;
    --border-strong: #35353c;
    --text: #ece9e2;
    --muted: #9a978f;
    --muted-2: #666358;
    --gold: #c9a26a;
    --gold-bright: #e8c98a;
    --red: #ff4d4d;
  }
  * { box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(201,162,106,0.1), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  .card {
    width: 100%;
    max-width: 360px;
    margin: 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .brand { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 24px; }
  .logo-badge {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: linear-gradient(145deg, #17140d, #0c0b08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-badge img { width: 100%; height: 100%; object-fit: contain; }
  .brand-name { font-weight: 700; font-size: 18px; letter-spacing: 0.08em; }
  .tagline { font-size: 10px; letter-spacing: 0.14em; color: var(--muted-2); text-transform: uppercase; }
  h1 { font-size: 15px; font-weight: 600; color: var(--muted); margin: 0 0 20px; text-align: center; text-transform: uppercase; letter-spacing: 0.06em; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: var(--gold); }
  button {
    width: 100%;
    background: linear-gradient(135deg, #8a6a3f, #6e5330);
    color: #10100d;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 11px 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  button:hover { background: linear-gradient(135deg, #a67c3d, #8a6a3f); border-color: var(--gold-bright); }
  .error {
    background: rgba(255,77,77,0.12);
    border: 1px solid rgba(255,77,77,0.4);
    color: var(--red);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12.5px;
    margin-bottom: 16px;
  }
  .hint { margin-top: 16px; font-size: 11.5px; color: var(--muted-2); text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <a href="/" class="brand" style="text-decoration:none;color:inherit;">
      <div class="logo-badge"><img src="/static/logo.png" alt="Aegis"></div>
      <div>
        <div class="brand-name" style="text-align:center;">AEGIS</div>
        <div class="tagline">AI Enhanced Guardian System</div>
      </div>
    </a>
    <h1>Sign in</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
      <button type="submit">Sign in</button>
    </form>
    <p class="hint">Once signed in, you'll get a code to pair with your helmet.</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --border: #262b33;
    --text: #e8eaed;
    --muted: #8a8f98;
    --green: #3ddc84;
    --amber: #ffb020;
    --red: #ff4d4d;
    --accent: #4d8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.09em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 22px;
    height: 22px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.live { background: var(--green); }
  main {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 20px;
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #feedWrap {
    position: relative;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #feedWrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  #feedWrap .placeholder {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 0 20px;
  }
  .simulate-row {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  input[type=file] {
    flex: 1;
    color: var(--muted);
    font-size: 13px;
  }
  input[type=file]::file-selector-button,
  input[type=file]::-webkit-file-upload-button {
    background: #1a1e25;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 500;
    margin-right: 10px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  input[type=file]::file-selector-button:hover,
  input[type=file]::-webkit-file-upload-button:hover {
    background: #232830;
    border-color: var(--muted);
  }
  button {
    background: #2a4fa0;
    color: #fff;
    border: 1px solid #3a63c0;
    border-radius: 12px;
    padding: 9px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }
  button:hover:not(:disabled) { background: #34599f; border-color: var(--accent); }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: default; }
  #screenFlash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
  }
  #screenFlash.flash-high { animation: screenFlashHigh 1.2s ease-out; }
  #screenFlash.flash-medium { animation: screenFlashMedium 1s ease-out; }
  @keyframes screenFlashHigh {
    0% { opacity: 0; box-shadow: inset 0 0 0 0 rgba(255,77,77,0); }
    10% { opacity: 1; box-shadow: inset 0 0 140px 24px rgba(255,77,77,0.55); }
    30% { opacity: 0.25; box-shadow: inset 0 0 90px 12px rgba(255,77,77,0.25); }
    50% { opacity: 1; box-shadow: inset 0 0 140px 24px rgba(255,77,77,0.55); }
    70% { opacity: 0.2; }
    100% { opacity: 0; box-shadow: inset 0 0 0 0 rgba(255,77,77,0); }
  }
  @keyframes screenFlashMedium {
    0% { opacity: 0; box-shadow: inset 0 0 0 0 rgba(255,176,32,0); }
    15% { opacity: 0.75; box-shadow: inset 0 0 110px 16px rgba(255,176,32,0.4); }
    50% { opacity: 0.25; }
    100% { opacity: 0; box-shadow: inset 0 0 0 0 rgba(255,176,32,0); }
  }
  #alertBanner.pulse { animation: bannerPulse 0.45s ease-in-out 3; }
  @keyframes bannerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.035); }
  }
  #alertBanner {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
  }
  #alertBanner.medium { background: rgba(255, 176, 32, 0.15); color: var(--amber); border: 1px solid var(--amber); }
  #alertBanner.high { background: rgba(255, 77, 77, 0.15); color: var(--red); border: 1px solid var(--red); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 500; }
  .level-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .level-pill.medium { background: rgba(255,176,32,0.15); color: var(--amber); }
  .level-pill.high { background: rgba(255,77,77,0.15); color: var(--red); }
  .stack { display: flex; flex-direction: column; gap: 20px; }
</style>
</head>
<body>

<div id="screenFlash"></div>

<header>
  <h1>
    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 2L4 5V11C4 16.5 7.4 21.2 12 22C16.6 21.2 20 16.5 20 11V5L12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M9 12L11 14L15.5 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    AEGIS
  </h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">connecting</span>
  </div>
</header>

<main>
  <div class="stack">
    <div class="panel">
      <h2>Live feed</h2>
      <div id="feedWrap">
        <span class="placeholder" id="feedPlaceholder">waiting for a helmet or simulated stream</span>
        <img id="liveFeed" style="display:none">
      </div>
      <div id="alertBanner"></div>
      <div class="simulate-row">
        <input type="file" id="simFile" accept="video/*">
        <button id="simBtn">Simulate helmet</button>
      </div>
    </div>
  </div>

  <div class="stack">
    <div class="panel">
      <h2>Alerts per day</h2>
      <canvas id="dailyChart" height="140"></canvas>
    </div>
    <div class="panel">
      <h2>Alerts by class</h2>
      <canvas id="classChart" height="140"></canvas>
    </div>
    <div class="panel">
      <h2>Recent history</h2>
      <table>
        <thead><tr><th>Time</th><th>Class</th><th>Side</th><th>Level</th><th>Score</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
const dashWsUrl = wsScheme + '://' + location.host + '/ws/dashboard';

const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const feedImg = document.getElementById('liveFeed');
const feedPlaceholder = document.getElementById('feedPlaceholder');
const alertBanner = document.getElementById('alertBanner');

let alertAudioCtx = null;
let lastAlertSound = 0;
let lastChartRefresh = 0;

function playAlertTone(level) {
  try {
    if (!alertAudioCtx) alertAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = alertAudioCtx;

    const beep = (freq, start, dur, type, peak) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
      gain.gain.exponentialRampToValueAtTime(peak, ctx.currentTime + start + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    };

    if (level === 'high') {
      // urgent alternating siren, unmistakable even from across the room
      beep(920, 0.00, 0.18, 'square', 0.18);
      beep(650, 0.20, 0.18, 'square', 0.18);
      beep(920, 0.40, 0.18, 'square', 0.18);
      beep(650, 0.60, 0.18, 'square', 0.18);
      beep(920, 0.80, 0.22, 'square', 0.2);
    } else {
      // a softer double chime, noticeable but not alarming
      beep(740, 0.00, 0.16, 'sine', 0.13);
      beep(740, 0.22, 0.16, 'sine', 0.13);
    }
  } catch (e) {}
}

function triggerFlashyAlert(level) {
  const now = Date.now();
  if (now - lastAlertSound < 2500) return;
  lastAlertSound = now;

  alertBanner.classList.remove('pulse');
  void alertBanner.offsetWidth;
  alertBanner.classList.add('pulse');

  const flashEl = document.getElementById('screenFlash');
  flashEl.className = '';
  void flashEl.offsetWidth;
  flashEl.className = level === 'high' ? 'flash-high' : 'flash-medium';

  playAlertTone(level);
}

function showAlert(alertMsg) {
  alertBanner.className = alertMsg.level;
  alertBanner.style.display = 'block';
  alertBanner.textContent = alertMsg.level.toUpperCase() + ' threat: ' + alertMsg.class + ' on the ' + alertMsg.side;

  triggerFlashyAlert(alertMsg.level);

  clearTimeout(showAlert._t);
  showAlert._t = setTimeout(() => { alertBanner.style.display = 'none'; }, 5000);

  const now = Date.now();
  if (now - lastChartRefresh > 2000) {
    lastChartRefresh = now;
    refreshCharts();
  }
}

function connectDashboardSocket() {
  const ws = new WebSocket(dashWsUrl);
  ws.onopen = () => {
    statusDot.classList.add('live');
    statusText.textContent = 'live';
  };
  ws.onclose = () => {
    statusDot.classList.remove('live');
    statusText.textContent = 'reconnecting';
    setTimeout(connectDashboardSocket, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'frame') {
      feedPlaceholder.style.display = 'none';
      feedImg.style.display = 'block';
      feedImg.src = 'data:image/jpeg;base64,' + msg.image;
    } else if (msg.type === 'alert') {
      showAlert(msg);
    }
  };
}
connectDashboardSocket();

document.getElementById('simBtn').addEventListener('click', async () => {
  const fileInput = document.getElementById('simFile');
  if (!fileInput.files.length) { alert('choose a video file first'); return; }
  const btn = document.getElementById('simBtn');
  btn.disabled = true;
  btn.textContent = 'streaming...';
  const form = new FormData();
  form.append('file', fileInput.files[0]);
  try {
    await fetch('/simulate_stream', { method: 'POST', body: form });
  } catch (e) {}
  setTimeout(() => { btn.disabled = false; btn.textContent = 'Simulate helmet'; }, 3000);
});

let dailyChart, classChart;

async function refreshCharts() {
  const res = await fetch('/api/alerts?days=14');
  const alerts = await res.json();

  const byDay = {};
  const byClass = {};
  for (const a of alerts) {
    const day = a.timestamp.slice(0, 10);
    byDay[day] = (byDay[day] || 0) + 1;
    byClass[a.class] = (byClass[a.class] || 0) + 1;
  }
  const days = Object.keys(byDay).sort();
  const dayCounts = days.map(d => byDay[d]);
  const classNames = Object.keys(byClass);
  const classCounts = classNames.map(c => byClass[c]);

  const chartColors = { grid: 'rgba(255,255,255,0.06)', text: '#8a8f98' };

  if (!dailyChart) {
    dailyChart = new Chart(document.getElementById('dailyChart'), {
      type: 'bar',
      data: { labels: days, datasets: [{ label: 'alerts', data: dayCounts, backgroundColor: '#4d8cff' }] },
      options: {
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: chartColors.grid }, ticks: { color: chartColors.text } },
          y: { beginAtZero: true, grid: { color: chartColors.grid }, ticks: { color: chartColors.text, precision: 0 } }
        }
      }
    });
  } else {
    dailyChart.data.labels = days;
    dailyChart.data.datasets[0].data = dayCounts;
    dailyChart.update();
  }

  if (!classChart) {
    classChart = new Chart(document.getElementById('classChart'), {
      type: 'bar',
      data: { labels: classNames, datasets: [{ label: 'alerts', data: classCounts, backgroundColor: '#3ddc84' }] },
      options: {
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { beginAtZero: true, grid: { color: chartColors.grid }, ticks: { color: chartColors.text, precision: 0 } },
          y: { grid: { color: chartColors.grid }, ticks: { color: chartColors.text } }
        }
      }
    });
  } else {
    classChart.data.labels = classNames;
    classChart.data.datasets[0].data = classCounts;
    classChart.update();
  }

  const tbody = document.getElementById('historyBody');
  tbody.innerHTML = '';
  alerts.slice(0, 25).forEach(a => {
    const tr = document.createElement('tr');
    const time = new Date(a.timestamp).toLocaleString();
    tr.innerHTML = '<td>' + time + '</td><td>' + a.class + '</td><td>' + a.side + '</td>' +
      '<td><span class="level-pill ' + a.level + '">' + a.level + '</span></td>' +
      '<td>' + a.score.toFixed(2) + '</td>';
    tbody.appendChild(tr);
  });
}

refreshCharts();
setInterval(refreshCharts, 20000);
</script>
</body>
</html>
